<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events near New York, NY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/page2.css">
</head>
<body>

    <div id="mesto-dlya-shapki"></div>

    <main>
        <div class="konteyner">

            <h1 class="page-main-title">Events near New York, NY</h1>
            <p class="page-subtitle">Events</p>
            <div class="blue-line"></div>

           <div class="filters-row">
    <button class="filter-chip" id="filterDate">
        <span>Any day</span>
        <img src="picture/pic/page2/ok.svg" alt="" class="chip-icon">
    </button>
    <button class="filter-chip" id="filterType">
        <span>Any type</span>
        <img src="picture/pic/page2/ok.svg" alt="" class="chip-icon">
    </button>
    <button class="filter-chip" id="filterDistance">
        <span>Any distance</span>
        <img src="picture/pic/page2/ok.svg" alt="" class="chip-icon">
    </button>
    <button class="filter-chip" id="filterCategory">
        <span>Any category</span>
        <img src="picture/pic/page2/ok.svg" alt="" class="chip-icon">
    </button>
</div>

            <div class="dropdown-container" id="dropdownContainer"></div>

            <div class="main-layout">
                <div class="events-column">
                    <div id="eventsContainer"></div>
                </div>

                <aside class="map-column">
                    <p class="map-label">Find events near</p>
                    <p class="map-city">New York, NY</p>
                    <div class="map-container">
                        <img src="picture/pic/page2/map-thumbnail.png.jpg" alt="map" class="map-img">
                        <button class="map-btn">
                            Browse in map
                            <img src="picture/pic/page2/map.svg" alt="" class="map-arrow">
                        </button>
                        <div class="map-close">
                            <span class="map-close-icon">✕</span>
                        </div>
                    </div>
                </aside>
            </div>

        </div>
    </main>

    <div id="mesto-dlya-futera"></div>

    <script src="scripts/data.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/page2.js"></script>
</body>
</html>
